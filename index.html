<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV V12.0</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; color: #fff; max-width: 480px; margin: 0 auto; }
        .header { background: #1a7a2e; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 18px; font-weight: 900; }
        .site-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; }
        .player-box { width: 100%; aspect-ratio: 16/9; background: #111; border-bottom: 3px solid #1a7a2e; }
        video { width: 100%; height: 100%; }
        #status { color: #00ff00; font-size: 13px; margin: 10px; text-align: center; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: #151515; border-radius: 10px; padding: 10px 5px; text-align: center; cursor: pointer; border: 1px solid #222; }
        .thumb { width: 50px; height: 50px; margin: 0 auto 5px; background: #fff; border-radius: 50%; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .thumb img { max-width: 100%; max-height: 100%; }
        .name { font-size: 10px; font-weight: bold; color: #ccc; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <!-- আপনার অরিজিনাল লোগো লিঙ্ক -->
        <img src="https://i.ibb.co/L5fX0Gg/BD-FAST-TV-Logo.png" class="site-logo">
        BD FAST TV <span style="font-size: 10px; opacity: 0.6;">V12.0</span>
    </div>

    <div class="player-box">
        <video id="video" controls autoplay playsinline poster="https://i.ibb.co/L5fX0Gg/BD-FAST-TV-Logo.png"></video>
    </div>
    <div id="status">চ্যানেল সিলেক্ট করুন</div>
    <div class="grid" id="grid"></div>

    <script>
        const proxy = "https://bdfast-proxy.sksunnysong143.workers.dev/?url=";

        // লোগো লিঙ্কগুলো cdn.jsdelivr.net দিয়ে পরিবর্তন করা হয়েছে যেন ব্লক না হয়
        const channels = [
            { name: "Test Channel", logo: "https://cdn-icons-png.flaticon.com/512/716/716429.png", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { name: "Somoy TV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/SomoyTV.png", url: "https://somoytv-live.shofat.com/somoy/index.m3u8" },
            { name: "Jamuna TV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/JamunaTV.png", url: "https://jamunatv-live.shofat.com/jamuna/index.m3u8" },
            { name: "NTV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/NTV.png", url: "https://list.iptvcat.com/my_list/s/9d1072d7e3966132410c2e3cd9294dc8.m3u8" },
            { name: "T Sports", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/TSports.png", url: "https://tsports-live.shofat.com/tsports/index.m3u8" },
            { name: "Independent", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/IndependentTV.png", url: "https://live.itvbd.com/hls/itv_720p.m3u8" }
        ];

        const grid = document.getElementById('grid');
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        let hls = null;

        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                status.innerText = "লোডিং: " + ch.name;
                const finalUrl = proxy + encodeURIComponent(ch.url);
                if (hls) hls.destroy();
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(finalUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play();
                        status.innerText = "চলছে: " + name;
                    });
                } else {
                    video.src = finalUrl;
                    video.play();
                }
            };
            card.innerHTML = `<div class="thumb"><img src="${ch.logo}"></div><div class="name">${ch.name}</div>`;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
