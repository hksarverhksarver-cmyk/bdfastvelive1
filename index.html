        .search-box { padding: 10px 15px; background: #0c0c0c; }
        #search-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; font-size: 14px; }
        #search-input:focus { border-color: #248b3b; }

        /* Channel Grid */
        .container { padding: 10px; }
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .channel-card { background: #1a1a1a; border-radius: 12px; padding: 10px 5px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.2s; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        const listContainer = document.getElementById('channel-list');
        const player = videojs('main-player');
        let activeCat = "All";

        function renderChannels(searchQuery = "") {
            listContainer.innerHTML = "";
            let filtered = channels;
            
            if(activeCat !== "All") {
                filtered = channels.filter(ch => ch.cat === activeCat);
            }
            
            if(searchQuery) {
                filtered = filtered.filter(ch => ch.name.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            filtered.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                const initial = ch.name.substring(0, 2);
                card.innerHTML = `<div class="logo-box">${initial}</div><div class="channel-name">${ch.name}</div>`;
                card.onclick = () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    player.src({ src: ch.url, type: 'application/x-mpegURL' });
                    player.play();
                };
                listContainer.appendChild(card);
            });
        }

        function filterCat(cat, btn) {
            activeCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderChannels();
        }

        function search() {
            const query = document.getElementById('search-input').value;
            renderChannels(query);
        }

        window.onload = () => {
            renderChannels();
            if(channels.length > 0) {
                player.src({ src: channels[0].url, type: 'application/x-mpegURL' });
            }
        };
    </script>
</body>
</html>
