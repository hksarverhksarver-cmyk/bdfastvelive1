<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV V11.0</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; color: #fff; max-width: 480px; margin: 0 auto; padding-bottom: 50px; }
        .header { background: #1a7a2e; padding: 15px; text-align: center; font-size: 20px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .site-logo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; background: #fff; }
        .player-box { width: 100%; aspect-ratio: 16/9; background: #111; border-bottom: 3px solid #1a7a2e; }
        video { width: 100%; height: 100%; }
        #status { color: #00ff00; font-size: 13px; margin: 10px 0; font-weight: bold; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .card { background: #151515; border-radius: 12px; padding: 12px 5px; text-align: center; cursor: pointer; border: 1px solid #222; }
        .card:active { background: #1a7a2e; }
        .thumb { width: 50px; height: 50px; margin: 0 auto 8px; background: #fff; border-radius: 50%; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .name { font-size: 10px; font-weight: bold; color: #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <!-- আপনার সাইটের লোগো এখানে ঠিক করা হয়েছে -->
        <img src="https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/SomoyTV.png" class="site-logo" alt="Logo">
        BD FAST TV <span style="font-size: 10px; opacity: 0.7;">V11.0</span>
    </div>

    <div class="player-box">
        <video id="video" controls autoplay playsinline poster="https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/SomoyTV.png"></video>
    </div>

    <div id="status">চ্যানেল সিলেক্ট করুন</div>

    <div class="grid" id="grid"></div>

    <script>
        const proxy = "https://bdfast-proxy.sksunnysong143.workers.dev/?url=";

        const channels = [
            { name: "NTV", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/NTV.png", url: "https://list.iptvcat.com/my_list/s/9d1072d7e3966132410c2e3cd9294dc8.m3u8" },
            { name: "Somoy TV", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/SomoyTV.png", url: "https://somoytv-live.shofat.com/somoy/index.m3u8" },
            { name: "Jamuna TV", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/JamunaTV.png", url: "https://jamunatv-live.shofat.com/jamuna/index.m3u8" },
            { name: "T Sports", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/TSports.png", url: "https://tsports-live.shofat.com/tsports/index.m3u8" },
            { name: "Independent", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/IndependentTV.png", url: "https://live.itvbd.com/hls/itv_720p.m3u8" },
            { name: "BTV", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/BTV.png", url: "https://list.iptvcat.com/my_list/s/3c539dc849b96e2607bda4b2538366a6.m3u8" },
            { name: "Test Channel", logo: "https://cdn-icons-png.flaticon.com/512/716/716429.png", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ];

        const grid = document.getElementById('grid');
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        let hls = null;

        function display() {
            grid.innerHTML = '';
            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => playStream(ch.url, ch.name);
                card.innerHTML = `<div class="thumb"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/50?text=TV'"></div><div class="name">${ch.name}</div>`;
                grid.appendChild(card);
            });
        }

        function playStream(url, name) {
            status.innerText = "লোডিং: " + name;
            const finalUrl = proxy + encodeURIComponent(url);
            
            if (hls) { hls.destroy(); }
            
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    status.innerText = "চলছে: " + name;
                });
                hls.on(Hls.Events.ERROR, () => {
                    status.innerText = "Error: লিঙ্কটি কাজ করছে না!";
                });
            } else {
                video.src = finalUrl;
                video.play();
            }
            window.scrollTo(0,0);
        }
        display();
    </script>
</body>
</html>
