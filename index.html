<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVIE LINK BD - Clone</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --red: #ff3131; --bg: #121212; --card-bg: #1e1e1e; --green: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; max-width: 600px; margin: 0 auto; padding-bottom: 50px; }

        /* Header Section */
        .header { text-align: center; padding: 20px; }
        .site-title { font-size: 35px; font-weight: 900; color: var(--red); text-transform: uppercase; letter-spacing: -1px; }
        .notice { font-size: 11px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 5px; margin-top: 10px; border-left: 3px solid var(--red); }

        /* Domain Buttons */
        .domain-links { display: flex; justify-content: center; gap: 5px; margin: 15px 0; flex-wrap: wrap; }
        .domain-btn { padding: 5px 12px; border-radius: 5px; font-size: 10px; font-weight: bold; text-decoration: none; color: #fff; background: #444; }
        .domain-btn.new { background: #777; }
        .domain-btn.active { background: #00bcd4; }

        /* Category Buttons */
        .categories { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .cat-btn { padding: 8px; border-radius: 5px; border: none; font-size: 11px; font-weight: bold; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; }
        
        /* Search Bar */
        .search-container { padding: 10px 15px; display: flex; gap: 5px; }
        #searchBox { flex: 1; padding: 12px; border-radius: 5px 0 0 5px; border: none; background: #252525; color: #fff; outline: none; }
        .search-btn { background: #00bcd4; border: none; padding: 0 15px; border-radius: 0 5px 5px 0; color: #fff; cursor: pointer; }

        /* Movie Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .movie-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #333; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        .badge-top { position: absolute; top: 5px; left: 5px; background: #ffc107; color: #000; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 3px; }
        .quality-tag { position: absolute; top: 5px; right: 5px; background: #007bff; color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 3px; }
        .view-count { position: absolute; bottom: 80px; right: 10px; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 6px; border-radius: 10px; display: flex; align-items: center; gap: 4px; }
        
        .movie-info { padding: 10px; text-align: center; }
        .movie-lang { font-size: 9px; background: var(--green); color: #000; padding: 2px 6px; border-radius: 3px; font-weight: bold; display: inline-block; margin-bottom: 5px; }
        .movie-title { font-size: 12px; font-weight: bold; color: #eee; height: 35px; overflow: hidden; }
        .movie-time { font-size: 10px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div class="site-title">MOVIELINKBD</div>
    <div class="notice">
        Official & Always Active Link: MovieLinkBD.com ✅<br>
        <small>যদি সাইট লোড না হয়, 1.1.1.1 VPN ব্যবহার করুন।</small>
    </div>
</div>

<div class="domain-links">
    <a href="#" class="domain-btn new">NEW</a>
    <a href="#" class="domain-btn active">.ONE</a>
    <a href="#" class="domain-btn">.WORK</a>
    <a href="#" class="domain-btn" style="background:#ffc107; color:#000;">.SHOP</a>
</div>

<div class="categories">
    <a href="#" class="cat-btn" style="background:#d32f2f;"><i class="fa-solid fa-house"></i> HOME</a>
    <a href="#" class="cat-btn" style="background:#2e7d32;"><img src="https://flagcdn.com/w20/bd.png" width="15"> BANGLA</a>
    <a href="#" class="cat-btn" style="background:#1976d2;"><i class="fa-solid fa-microphone"></i> DUBBED</a>
</div>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="সার্চ করে খুঁজে নিন পছন্দের মুভি..." onkeyup="searchMovie()">
    <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
</div>

<div class="movie-grid" id="movieList">
    <!-- মুভিগুলো এখানে অটোমেটিক লোড হবে -->
</div>

<script>
    // মুভি ডাটাবেস (এখানে আপনি আপনার মুভিগুলো যোগ করবেন)
    const movies = [
        { 
            title: "Royal (2025) [ORG Hindi]", 
            img: "https://m.media-amazon.com/images/M/MV5BMzU5ZGYzNmQtMTMyZi00YmY3LThjYTQtOTY0YjM2ZmYwY2E1XkEyXkFqcGc@._V1_.jpg", 
            quality: "WEB-DL", 
            views: "6.61K", 
            time: "2 hours ago", 
            lang: "HINDI-KANNADA",
            link: "#" 
        },
        { 
            title: "Honey Bunch (2025) Hindi ORG", 
            img: "https://m.media-amazon.com/images/M/MV5BMjY5NjU0NTY5N15BMl5BanBnXkFtZTgwNjAzMjA2MTE@._V1_.jpg", 
            quality: "WEB-DL", 
            views: "53.1K", 
            time: "6 hours ago", 
            lang: "HINDI-ENGLISH",
            link: "#" 
        },
        { 
            title: "FIFA World Cup 2026 Semi Finals", 
            img: "https://static.independent.co.uk/2022/12/18/18/AFP_333F2UN.jpg", 
            quality: "HDTV", 
            views: "5.44K", 
            time: "13 hours ago", 
            lang: "ENGLISH",
            link: "#" 
        }
    ];

    function displayMovies(data) {
        const list = document.getElementById('movieList');
        list.innerHTML = "";
        data.forEach(movie => {
            list.innerHTML += `
                <a href="${movie.link}" style="text-decoration:none;">
                <div class="movie-card">
                    <div class="badge-top">PINNED</div>
                    <div class="quality-tag">${movie.quality}</div>
                    <img src="${movie.img}" alt="Poster">
                    <div class="view-count"><i class="fa-regular fa-eye"></i> ${movie.views}</div>
                    <div class="movie-info">
                        <div class="movie-lang">${movie.lang}</div>
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-time">${movie.time}</div>
                    </div>
                </div>
                </a>
            `;
        });
    }

    function searchMovie() {
        const val = document.getElementById('searchBox').value.toLowerCase();
        const filtered = movies.filter(m => m.title.toLowerCase().includes(val));
        displayMovies(filtered);
    }

    displayMovies(movies);
</script>

</body>
</html>
