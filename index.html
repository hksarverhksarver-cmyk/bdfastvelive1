<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV - Pro</title>
    <!-- Video.js CSS and JS -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main: #1a7a2e; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: var(--bg); color: #fff; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        
        .header { background: var(--main); padding: 12px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        .app-name { font-weight: bold; font-size: 20px; color: #fff; }

        .player-container { width: 100%; background: #000; aspect-ratio: 16/9; position: sticky; top: 50px; z-index: 999; border-bottom: 3px solid var(--main); }
        .video-js { width: 100% !important; height: 100% !important; }

        #status-bar { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 5px; font-size: 11px; color: #00ff00; z-index: 10; border: 1px solid var(--main); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .card { background: #fff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; padding: 12px; cursor: pointer; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card:active { transform: scale(0.92); }
        .card.active { border-color: var(--main); background: #e8f5e9; }
        .card img { width: 100%; height: 50px; object-fit: contain; margin-bottom: 8px; }
        .card span { color: #222; font-size: 10px; font-weight: 800; text-align: center; text-transform: uppercase; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #111; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; }
        .nav-item.active { color: var(--main); }
        .nav-item i { font-size: 20px; }
    </style>
</head>
<body>

<div class="header"><span class="app-name">BD FAST TV</span></div>

<div class="player-container">
    <div id="status-bar">অপেক্ষা করুন...</div>
    <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="500" height="280" poster="https://i.postimg.cc/mD8zYJ5r/logo.png" data-setup='{}'>
        <p class="vjs-no-js">To view this video please enable JavaScript.</p>
    </video>
</div>

<div class="grid" id="mainGrid"></div>

<div class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-play"></i>Live</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-globe"></i>Portal</a>
    <a href="#" class="nav-item" onclick="location.reload()"><i class="fa-solid fa-rotate"></i>Reload</a>
</div>

<script>
    const player = videojs('my-video');
    const statusBar = document.getElementById('status-bar');

    const channels = [
        { name: "Test Stream", logo: "https://via.placeholder.com/100?text=READY", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
        { name: "Somoy TV", logo: "https://i.postimg.cc/85M1f0xY/somoy.png", url: "https://somoytv-live.shofat.com/somoy/index.m3u8" },
        { name: "Jamuna TV", logo: "https://i.postimg.cc/9FmKqW7s/jamuna.png", url: "https://live-jamuna.shofat.com/jamuna/index.m3u8" },
        { name: "T Sports", logo: "https://i.postimg.cc/7Z9Z7p5z/tsports.png", url: "https://tsports-live.shofat.com/tsports/index.m3u8" },
        { name: "Independent", logo: "https://i.postimg.cc/3xwzL2B2/independent.png", url: "https://live.itvbd.com/hls/itv_720p.m3u8" },
        { name: "GTV Live", logo: "https://i.postimg.cc/Xv4x4r3T/gtv.png", url: "https://gtv-live.shofat.com/gtv/index.m3u8" }
    ];

    function init() {
        const grid = document.getElementById('mainGrid');
        channels.forEach((ch, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/100?text=TV'"><span>${ch.name}</span>`;
            card.onclick = () => {
                playChannel(ch.url, ch.name);
                document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
            };
            grid.appendChild(card);
        });
        playChannel(channels[0].url, channels[0].name);
    }

    function playChannel(url, name) {
        statusBar.innerText = `Connecting ${name}...`;
        statusBar.style.color = "#ffcc00";

        player.src({
            src: url,
            type: 'application/x-mpegURL'
        });

        player.ready(function() {
            player.play().then(() => {
                statusBar.innerText = `● ${name} IS WORKING`;
                statusBar.style.color = "#00ff00";
            }).catch(error => {
                statusBar.innerText = "প্লে বাটনে ক্লিক করুন";
                statusBar.style.color = "#fff";
            });
        });

        player.on('error', function() {
            statusBar.innerText = "সার্ভার সমস্যা, অন্য চ্যানেল দেখুন";
            statusBar.style.color = "#ff4444";
        });
    }

    init();
</script>
</body>
</html>
