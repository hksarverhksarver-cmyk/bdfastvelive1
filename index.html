<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; max-width: 480px; margin: 0 auto; }
        .header { background: #1a7a2e; padding: 15px; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .site-logo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 3px solid #1a7a2e; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: #141414; border-radius: 10px; padding: 10px; cursor: pointer; border: 1px solid #222; }
        .card img { width: 50px; height: 50px; object-fit: contain; }
        .card div { font-size: 10px; margin-top: 5px; font-weight: bold; color: #ccc; }
        #status { color: #0f0; font-size: 12px; margin: 5px 0; display: none; }
    </style>
</head>
<body>

<div class="header">
    <!-- লোগো লিঙ্ক ঠিক করা হয়েছে -->
    <img src="https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/SomoyTV.png" class="site-logo">
    BD FAST TV
</div>

<video id="video" controls autoplay playsinline poster="https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/SomoyTV.png"></video>
<div id="status"></div>

<div class="grid" id="grid"></div>

<script>
    lucide.createIcons();
    // আপনার সঠিক প্রক্সি লিঙ্ক
    const proxy = "https://bdfast-proxy.sksunnysong143.workers.dev/?url=";

    const channels = [
        // টেস্ট স্ট্রিম (এটি চললে বুঝবেন প্রক্সি ঠিক আছে)
        { name: "Test Stream", logo: "https://via.placeholder.com/50", url: proxy + "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
        { name: "Somoy TV", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/SomoyTV.png", url: proxy + "https://somoytv-live.shofat.com/somoy/index.m3u8" },
        { name: "Jamuna TV", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/JamunaTV.png", url: proxy + "https://jamunatv-live.shofat.com/jamuna/index.m3u8" },
        { name: "Independent", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/IndependentTV.png", url: proxy + "https://live.itvbd.com/hls/itv_720p.m3u8" },
        { name: "T Sports", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/TSports.png", url: proxy + "https://tsports-live.shofat.com/tsports/index.m3u8" }
    ];

    const video = document.getElementById('video');
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');

    channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => {
            status.style.display = 'block';
            status.innerText = "প্লে হচ্ছে: " + ch.name;
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = ch.url;
            }
            window.scrollTo(0,0);
        };
        div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;
        grid.appendChild(div);
    });
</script>
</body>
</html>
