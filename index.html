<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV V10.0</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #080808; color: #fff; max-width: 480px; margin: 0 auto; padding-bottom: 50px; }
        .header { background: #1a7a2e; padding: 15px; text-align: center; font-size: 20px; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 3px solid #1a7a2e; }
        video { width: 100%; height: 100%; background: #000; }
        #status { color: #00ff00; font-size: 14px; margin: 10px 0; font-weight: bold; text-align: center; min-height: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .card { background: #121212; border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; border: 1px solid #222; }
        .card:active { background: #1a7a2e; transform: scale(0.95); }
        .thumb { width: 55px; height: 55px; margin: 0 auto 8px; background: #fff; border-radius: 50%; padding: 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: contain; }
        .name { font-size: 10px; font-weight: bold; color: #eee; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">BD FAST TV <span style="font-size: 10px;">V10.0</span></div>

    <div class="player-box">
        <video id="video" controls autoplay playsinline poster="https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/SomoyTV.png"></video>
    </div>

    <div id="status">চ্যানেল সিলেক্ট করুন</div>

    <div class="grid" id="grid"></div>

    <script>
        // আপনার প্রক্সি লিঙ্ক
        const proxy = "https://bdfast-proxy.sksunnysong143.workers.dev/?url=";

        // লোগো লিঙ্কগুলো jsDelivr CDN ব্যবহার করে ঠিক করা হয়েছে
        const channels = [
            { name: "NTV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/NTV.png", url: "https://list.iptvcat.com/my_list/s/9d1072d7e3966132410c2e3cd9294dc8.m3u8" },
            { name: "BTV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/BTV.png", url: "https://list.iptvcat.com/my_list/s/3c539dc849b96e2607bda4b2538366a6.m3u8" },
            { name: "DBC News", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/DBCNews.png", url: "https://list.iptvcat.com/my_list/s/c5db599604e1db7c8517ee6a4552e000.m3u8" },
            { name: "My TV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/MyTV.png", url: "https://list.iptvcat.com/my_list/s/2377755513294b82760a04aa09ec9404.m3u8" },
            { name: "RTV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/RTV.png", url: "https://list.iptvcat.com/my_list/s/b4b2c40488e3f04b43474e4451220a6d.m3u8" },
            { name: "Somoy TV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/SomoyTV.png", url: "https://somoytv-live.shofat.com/somoy/index.m3u8" },
            { name: "Jamuna TV", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/JamunaTV.png", url: "https://jamunatv-live.shofat.com/jamuna/index.m3u8" },
            { name: "Independent", logo: "https://cdn.jsdelivr.net/gh/thebeastv/BDTV@main/Logos/IndependentTV.png", url: "https://live.itvbd.com/hls/itv_720p.m3u8" },
            { name: "Test Stream", logo: "https://cdn-icons-png.flaticon.com/512/716/716429.png", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ];

        const grid = document.getElementById('grid');
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        let hls = null;

        function display() {
            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => play(ch.url, ch.name);
                card.innerHTML = `<div class="thumb"><img src="${ch.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5833/5833290.png'"></div><div class="name">${ch.name}</div>`;
                grid.appendChild(card);
            });
        }

        function play(url, name) {
            status.innerText = "লোডিং: " + name;
            const finalUrl = proxy + encodeURIComponent(url);
            
            if (hls) { hls.destroy(); }
            
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    status.innerText = "চলছে: " + name;
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) status.innerText = "Error: লিঙ্কটি কাজ করছে না!";
                });
            } else {
                video.src = finalUrl;
                video.play();
            }
            window.scrollTo(0,0);
        }
        display();
    </script>
</body>
</html>
