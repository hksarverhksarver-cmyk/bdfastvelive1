<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD FAST TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background: #1a7a2e; padding: 15px; font-size: 20px; font-weight: bold; }
        .player { width: 100%; aspect-ratio: 16/9; background: #222; }
        video { width: 100%; height: 100%; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .btn { background: #fff; color: #000; padding: 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">BD FAST TV</div>
<div class="player">
    <video id="video" controls autoplay playsinline></video>
</div>

<div class="grid">
    <div class="btn" onclick="play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">TEST CHANNEL (১০০% চলবে)</div>
    <div class="btn" onclick="play('https://live.itvbd.com/hls/itv_720p.m3u8')">INDEPENDENT TV</div>
    <div class="btn" onclick="play('https://somoytv-live.shofat.com/somoy/index.m3u8')">SOMOY TV</div>
    <div class="btn" onclick="play('https://live-jamuna.shofat.com/jamuna/index.m3u8')">JAMUNA TV</div>
</div>

<script>
    const video = document.getElementById('video');
    function play(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }
    }
    // শুরুতে টেস্ট চ্যানেল চলবে
    play('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8');
</script>
</body>
</html>
