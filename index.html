<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --green: #1a7a2e; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; max-width: 500px; margin: 0 auto; padding-bottom: 70px; }
        .header { background: var(--green); padding: 12px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; }
        .header span { font-weight: bold; font-size: 20px; }
        .player-box { width: 100%; background: #000; aspect-ratio: 16/9; position: sticky; top: 55px; z-index: 99; border-bottom: 2px solid var(--green); }
        video { width: 100%; height: 100%; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: #fff; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; position: relative; }
        .card img { width: 100%; height: 50px; object-fit: contain; }
        .card span { color: #000; font-size: 10px; font-weight: bold; display: block; margin-top: 5px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #111; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #333; }
        .nav-item { color: #888; font-size: 10px; text-decoration: none; text-align: center; }
        .nav-item i { font-size: 18px; display: block; }
    </style>
</head>
<body>

<div class="header"><span>BD FAST TV</span></div>
<div class="player-box"><video id="video" controls autoplay playsinline></video></div>
<div class="grid" id="grid"></div>

<div class="bottom-nav">
    <a href="#" class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-play"></i>Live</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-globe"></i>Portal</a>
</div>

<script>
    const video = document.getElementById('video');
    // প্রক্সি সার্ভার যা ব্লক এড়াতে সাহায্য করবে
    const proxy = "https://worker-proud-sun-683a.sk-sabbir-iptv.workers.dev/?url=";

    const channels = [
        { name: "SOMOY TV", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/SomoyTV.png", url: "https://somoytv-live.shofat.com/somoy/index.m3u8" },
        { name: "JAMUNA TV", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/JamunaTV.png", url: "https://live-jamuna.shofat.com/jamuna/index.m3u8" },
        { name: "T SPORTS", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/TSports.png", url: "https://tsports-live.shofat.com/tsports/index.m3u8" },
        { name: "INDEPENDENT", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/IndependentTV.png", url: "https://live.itvbd.com/hls/itv_720p.m3u8" },
        { name: "DBC NEWS", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/DBCNews.png", url: "https://dbcnews-live.shofat.com/dbcnews/index.m3u8" },
        { name: "TEST CHANNEL", logo: "https://via.placeholder.com/100?text=OK", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
    ];

    function play(rawUrl) {
        // প্রক্সি দিয়ে লিংকটি তৈরি করা হচ্ছে
        const finalUrl = rawUrl.includes("test-streams") ? rawUrl : proxy + encodeURIComponent(rawUrl);
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = finalUrl;
            video.play();
        }
    }

    channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => play(ch.url);
        div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
        document.getElementById('grid').appendChild(div);
    });

    play(channels[0].url); // শুরুতেই সময় টিভি চলবে
</script>
</body>
</html>
