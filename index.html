<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; text-align: center; max-width: 480px; margin: 0 auto; }
        .header { background: #1a7a2e; padding: 15px; font-weight: bold; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .site-logo { width: 40px; height: 40px; border-radius: 50%; background: #fff; border: 2px solid #fff; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 3px solid #1a7a2e; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 12px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:active { background: #1a7a2e; }
        .card img { width: 50px; height: 50px; object-fit: contain; }
        .card div { font-size: 11px; margin-top: 8px; font-weight: bold; color: #eee; }
        #status { color: #00ff00; font-size: 13px; margin: 8px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <!-- লোগোর জন্য নতুন লিঙ্ক -->
    <img src="https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/SomoyTV.png" class="site-logo">
    BD FAST TV
</div>

<video id="video" controls autoplay playsinline poster="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0N-9L7R8N-q-A1fA_7YV2J4Jj6z4L-Q-vWw&s"></video>
<div id="status">চ্যানেল সিলেক্ট করুন</div>

<div class="grid" id="grid"></div>

<script>
    // আপনার প্রক্সি লিঙ্ক
    const proxy = "https://bdfast-proxy.sksunnysong143.workers.dev/?url=";

    const channels = [
        { name: "Test Stream", logo: "https://via.placeholder.com/150/1a7a2e/FFFFFF?text=TEST", url: proxy + "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
        { name: "Independent", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/IndependentTV.png", url: proxy + "https://live.itvbd.com/hls/itv_720p.m3u8" },
        { name: "Somoy TV", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/SomoyTV.png", url: proxy + "https://somoytv-live.shofat.com/somoy/index.m3u8" },
        { name: "Jamuna TV", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/JamunaTV.png", url: proxy + "https://jamunatv-live.shofat.com/jamuna/index.m3u8" },
        { name: "T Sports", logo: "https://raw.githubusercontent.com/thebeastv/BDTV/main/Logos/TSports.png", url: proxy + "https://tsports-live.shofat.com/tsports/index.m3u8" }
    ];

    const video = document.getElementById('video');
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');
    let hls = null;

    channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => {
            status.innerText = "প্লে হচ্ছে: " + ch.name;
            if (hls) { hls.destroy(); }
            
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(ch.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = ch.url;
                video.play();
            }
            window.scrollTo(0,0);
        };
        div.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/50?text=TV'"><div>${ch.name}</div>`;
        grid.appendChild(div);
    });
</script>
</body>
</html>
