<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV - Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #fff; max-width: 480px; margin: 0 auto; padding-bottom: 90px; }
        .header { background: #1a7a2e; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 300; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .site-logo { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; }
        .player-container { width: 100%; background: #000; aspect-ratio: 16/9; position: sticky; top: 59px; z-index: 200; }
        video { width: 100%; height: 100%; }
        .category-tabs { padding: 15px; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .cat-tab { padding: 8px 18px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 14px; }
        .cat-tab.active { background: #1a7a2e; border-color: #1a7a2e; color: #fff; }
        .channel-grid { padding: 0 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .channel-card { background: #1a1a1a; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; position: relative;}
        .channel-card:active { transform: scale(0.95); background: #222; }
        .ch-thumb { width: 100%; aspect-ratio: 1/1; background: #252525; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ch-thumb img { width: 80%; height: 80%; object-fit: contain; }
        .ch-name { font-size: 11px; font-weight: 600; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .live-tag { position: absolute; top: 5px; right: 5px; background: #ff2222; color: #fff; font-size: 7px; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://i.postimg.cc/mD8zYJ5r/logo.png" class="site-logo" onerror="this.src='https://via.placeholder.com/40'">
        <div style="font-weight:bold; font-size:18px;">BD FAST TV</div>
    </div>
</div>

<div class="player-container">
    <video id="video" controls autoplay playsinline poster="https://i.postimg.cc/mD8zYJ5r/logo.png"></video>
</div>

<div class="category-tabs">
    <button class="cat-tab active" onclick="filterData('All', this)">সব চ্যানেল</button>
    <button class="cat-tab" onclick="filterData('News', this)">সংবাদ</button>
    <button class="cat-tab" onclick="filterData('Music', this)">গান</button>
</div>

<div class="channel-grid" id="mainGrid"></div>

<script>
    const videoElem = document.getElementById('video');
    const channelData = [
        { name: "Somoy TV", cat: "News", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/SomoyTV.png", url: "https://somoytv-live.shofat.com/somoy/index.m3u8" },
        { name: "Independent TV", cat: "News", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/IndependentTV.png", url: "https://live.itvbd.com/hls/itv_720p.m3u8" },
        { name: "Sangeet Bangla", cat: "Music", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/SangeetBangla.png", url: "https://sb.shofat.com/sb/index.m3u8" },
        { name: "Test Stream (Global)", cat: "All", logo: "https://via.placeholder.com/50?text=TV", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
    ];

    function render(cat = 'All') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        channelData.forEach(item => {
            if(cat === 'All' || item.cat === cat) {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => playStream(item.url);
                card.innerHTML = `<div class="live-tag">LIVE</div><div class="ch-thumb"><img src="${item.logo}" onerror="this.src='https://via.placeholder.com/50?text=TV'"></div><div class="ch-name">${item.name}</div>`;
                grid.appendChild(card);
            }
        });
    }

    function playStream(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(videoElem);
            hls.on(Hls.Events.MANIFEST_PARSED, () => videoElem.play());
        } else if (videoElem.canPlayType('application/vnd.apple.mpegurl')) {
            videoElem.src = url;
            videoElem.play();
        }
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function filterData(cat, btn) {
        render(cat);
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
    }

    render();
    // Play first channel by default
    playStream(channelData[0].url);
</script>
</body>
</html>
