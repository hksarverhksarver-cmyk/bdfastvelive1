<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD FAST TV - Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --green: #1a7a2e; --bg: #0f1014; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }

        /* Header */
        .header { background: var(--green); padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .app-name { font-weight: bold; font-size: 18px; }

        /* Player */
        .player-box { width: 100%; background: #000; aspect-ratio: 16/9; position: sticky; top: 56px; z-index: 999; border-bottom: 3px solid var(--green); }
        video { width: 100%; height: 100%; background: #000; }

        /* Grid Design (Like Hridoy TV) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; align-items: center; padding: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .card:active { transform: scale(0.92); }
        .card img { width: 100%; height: 60px; object-fit: contain; margin-bottom: 5px; }
        .card span { color: #333; font-size: 11px; font-weight: 800; text-align: center; text-transform: uppercase; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #16171b; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; }
        .nav-item.active { color: var(--green); }
        .nav-item i { font-size: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:8px;">
        <img src="https://i.postimg.cc/mD8zYJ5r/logo.png" width="30" height="30" style="border-radius:50%; background:#fff;">
        <span class="app-name">BD FAST TV</span>
    </div>
    <i class="fa-solid fa-magnifying-glass"></i>
</div>

<div class="player-box">
    <video id="video" controls autoplay playsinline poster="https://i.postimg.cc/mD8zYJ5r/logo.png"></video>
</div>

<div class="grid" id="mainGrid"></div>

<div class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-play"></i>Live</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-globe"></i>Portal</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-bars"></i>Menu</a>
</div>

<script>
    const video = document.getElementById('video');
    
    // আপনার দেওয়া নতুন ৫টি আইপি এবং কিছু সচল বাংলাদেশি চ্যানেল
    const channels = [
        { name: "Premium 1", logo: "https://via.placeholder.com/100/ffffff/000000?text=P1", url: "https://list.iptvcat.com/my_list/s/b2d52950909156317dcf65c9d2c57edf.m3u8" },
        { name: "Premium 2", logo: "https://via.placeholder.com/100/ffffff/000000?text=P2", url: "https://list.iptvcat.com/my_list/s/c7a8be1274c60107c86e04464d91c787.m3u8" },
        { name: "Premium 3", logo: "https://via.placeholder.com/100/ffffff/000000?text=P3", url: "https://list.iptvcat.com/my_list/s/ab69b67f3089b572b64b412fef172c41.m3u8" },
        { name: "Premium 4", logo: "https://via.placeholder.com/100/ffffff/000000?text=P4", url: "https://list.iptvcat.com/my_list/s/824c42225cc514fc6e3142fa213db766.m3u8" },
        { name: "Premium 5", logo: "https://via.placeholder.com/100/ffffff/000000?text=P5", url: "https://list.iptvcat.com/my_list/s/4e79f467e70971e36acafd5a31fdabc4.m3u8" },
        { name: "Somoy TV", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/SomoyTV.png", url: "https://somoytv-live.shofat.com/somoy/index.m3u8" },
        { name: "Jamuna TV", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/JamunaTV.png", url: "https://live-jamuna.shofat.com/jamuna/index.m3u8" },
        { name: "T Sports", logo: "https://raw.githubusercontent.com/sk-Sabbir/BD_IPTV/main/Logos/TSports.png", url: "https://tsports-live.shofat.com/tsports/index.m3u8" }
    ];

    function init() {
        const grid = document.getElementById('mainGrid');
        channels.forEach((ch) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/100?text=TV'"><span>${ch.name}</span>`;
            card.onclick = () => play(ch.url);
            grid.appendChild(card);
        });
        play(channels[0].url); // প্রথম চ্যানেল লোড
    }

    function play(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    init();
</script>
</body>
</html>
