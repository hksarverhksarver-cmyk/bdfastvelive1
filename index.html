<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD FAST TV - V11.0</title>
    <!-- Video.js for better player support -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0c0c0c; color: white; }

        /* Header Area */
        .header { background-color: #248b3b; padding: 15px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .header img { width: 40px; height: 40px; border-radius: 50%; background: white; }
        .header h1 { font-size: 20px; }

        /* Video Player Area */
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 70px; z-index: 999; border-bottom: 2px solid #248b3b; }
        #main-player { width: 100%; height: 100%; }

        /* Channel List Area */
        .container { padding: 15px; }
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .channel-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border 0.2s;
            border: 1px solid #333;
        }
        .channel-card:hover { transform: scale(1.05); border-color: #248b3b; }
        .channel-card.active { border-color: #248b3b; background: #248b3b22; }

        .channel-card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            border-radius: 50%;
            padding: 5px;
            margin-bottom: 8px;
        }
        .channel-card p { font-size: 12px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Responsive Mobile adjustment */
        @media (max-width: 480px) {
            .channel-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .channel-card img { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://via.placeholder.com/40" alt="Logo">
        <h1>BD FAST TV <span style="font-size: 12px;">V11.0</span></h1>
    </div>

    <!-- Video Player -->
    <div class="player-container">
        <video id="main-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" data-setup='{}'>
            <source src="" type="application/x-mpegURL">
        </video>
    </div>

    <div class="container">
        <h3 style="margin-bottom: 15px; color: #248b3b;">লাইভ টিভি চ্যানেলসমূহ</h3>
        <div class="channel-grid" id="channel-list">
            <!-- Channels will be loaded here via JS -->
        </div>
    </div>

    <!-- Video.js and HLS support -->
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // চ্যানেল লিস্ট (এখানে আপনার অরিজিনাল লিঙ্ক বসান)
        const channels = [
            { name: "Somoy TV", logo: "https://upload.wikimedia.org/wikipedia/en/2/21/Somoy_TV_logo.png", url: "https://YOUR_STREAM_LINK_HERE.m3u8" },
            { name: "Independent", logo: "https://upload.wikimedia.org/wikipedia/en/d/df/Independent_Television_logo.png", url: "URL_HERE" },
            { name: "Jamuna TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/0/07/Jamuna_Television_logo.svg/1200px-Jamuna_Television_logo.svg.png", url: "URL_HERE" },
            { name: "NTV", logo: "https://upload.wikimedia.org/wikipedia/commons/1/10/NTV_Logo.png", url: "URL_HERE" },
            { name: "RTV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/8/87/RTV_logo.svg/1200px-RTV_logo.svg.png", url: "URL_HERE" },
            { name: "Channel i", logo: "https://upload.wikimedia.org/wikipedia/commons/c/c9/Channel_i_logo.png", url: "URL_HERE" },
            { name: "Deepto TV", logo: "https://upload.wikimedia.org/wikipedia/en/3/36/Deepto_TV_logo.png", url: "URL_HERE" },
            { name: "T Sports", logo: "https://upload.wikimedia.org/wikipedia/en/2/23/T_Sports_Logo.png", url: "URL_HERE" },
            { name: "GTV", logo: "https://upload.wikimedia.org/wikipedia/en/3/3d/GTV_Bangladesh_logo.png", url: "URL_HERE" },
            { name: "Maasranga TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/a/a2/Maasranga_Television_logo.svg/1200px-Maasranga_Television_logo.svg.png", url: "URL_HERE" },
            { name: "News 24", logo: "https://upload.wikimedia.org/wikipedia/en/e/e0/News24_Bangladesh_Logo.png", url: "URL_HERE" },
            { name: "Ekattor TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/8/8a/Ekattor_TV_logo.svg/1200px-Ekattor_TV_logo.svg.png", url: "URL_HERE" },
            { name: "DBC News", logo: "https://upload.wikimedia.org/wikipedia/en/6/64/DBC_News_Logo.png", url: "URL_HERE" },
            { name: "BTV", logo: "https://upload.wikimedia.org/wikipedia/en/4/4b/Bangladesh_Television_logo.png", url: "URL_HERE" },
            { name: "Banglavision", logo: "https://upload.wikimedia.org/wikipedia/en/c/ca/Banglavision_Logo.png", url: "URL_HERE" },
            { name: "ATN Bangla", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/4/40/ATN_Bangla_logo.svg/1200px-ATN_Bangla_logo.svg.png", url: "URL_HERE" },
            { name: "ATN News", logo: "https://upload.wikimedia.org/wikipedia/en/c/c1/ATN_News_logo.png", url: "URL_HERE" },
            { name: "Boishakhi TV", logo: "https://upload.wikimedia.org/wikipedia/en/e/e6/Boishakhi_TV_logo.png", url: "URL_HERE" },
            { name: "Asian TV", logo: "https://upload.wikimedia.org/wikipedia/en/7/77/Asian_TV_Logo.png", url: "URL_HERE" },
            { name: "SA TV", logo: "https://upload.wikimedia.org/wikipedia/en/1/18/SATV_logo.png", url: "URL_HERE" },
            { name: "Channel 24", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/1/14/Channel_24_Logo.png/250px-Channel_24_Logo.png", url: "URL_HERE" },
            { name: "Mohona TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Mohona_Television_logo.svg/1200px-Mohona_Television_logo.svg.png", url: "URL_HERE" },
            { name: "Ekushey TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/b/b3/Ekushey_TV_logo.svg/1200px-Ekushey_TV_logo.svg.png", url: "URL_HERE" },
            { name: "Duronto TV", logo: "https://upload.wikimedia.org/wikipedia/en/c/ca/Duronto_TV_logo.png", url: "URL_HERE" },
            { name: "Bijoy TV", logo: "https://upload.wikimedia.org/wikipedia/en/4/42/Bijoy_TV_logo.png", url: "URL_HERE" },
            { name: "Desh TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f0/Desh_TV_logo.svg/1200px-Desh_TV_logo.svg.png", url: "URL_HERE" },
            { name: "My TV", logo: "https://upload.wikimedia.org/wikipedia/en/4/4c/MyTV_logo.png", url: "URL_HERE" },
            { name: "Nagorik TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/9/9f/Nagorik_Logo.png/250px-Nagorik_Logo.png", url: "URL_HERE" },
            { name: "Global TV", logo: "https://via.placeholder.com/60", url: "URL_HERE" },
            { name: "Sony Sports 1", logo: "https://via.placeholder.com/60", url: "URL_HERE" },
            { name: "Sony Sports 2", logo: "https://via.placeholder.com/60", url: "URL_HERE" },
            { name: "Star Sports 1", logo: "https://via.placeholder.com/60", url: "URL_HERE" },
            { name: "Star Sports 2", logo: "https://via.placeholder.com/60", url: "URL_HERE" },
            { name: "Bein Sports", logo: "https://via.placeholder.com/60", url: "URL_HERE" }
        ];

        const channelList = document.getElementById('channel-list');
        const player = videojs('main-player');

        // চ্যানেলগুলো রেন্ডার করা
        channels.forEach((channel, index) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <img src="${channel.logo}" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/60?text=TV'">
                <p>${channel.name}</p>
            `;
            
            card.onclick = () => {
                // একটিভ ক্লাস সেট করা
                document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');

                // প্লেয়ারে চ্যানেল লোড করা
                player.src({
                    src: channel.url,
                    type: 'application/x-mpegURL'
                });
                player.play();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            channelList.appendChild(card);
        });

        // ডিফল্ট ভাবে প্রথম চ্যানেলটি লোড করা
        if(channels.length > 0) {
            player.src({ src: channels[0].url, type: 'application/x-mpegURL' });
        }
    </script>
</body>
</html>
