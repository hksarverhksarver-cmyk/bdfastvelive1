<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD FAST TV - V11.0</title>
    <!-- Video.js Player CSS -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0c0c0c; color: white; padding-bottom: 20px; }

        /* Header */
        .header { background-color: #248b3b; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .header h1 { font-size: 18px; color: #fff; letter-spacing: 1px; }

        /* Video Player Area */
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 47px; z-index: 999; border-bottom: 3px solid #248b3b; }
        #main-player { width: 100%; height: 100%; }

        .container { padding: 15px; }
        .section-title { color: #248b3b; font-size: 17px; margin-bottom: 15px; font-weight: bold; border-left: 4px solid #248b3b; padding-left: 10px; }

        /* Grid System (3 Columns for Mobile) */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .channel-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .channel-card:active { transform: scale(0.95); background: #248b3b22; }
        .channel-card.active { border-color: #248b3b; background: #248b3b1a; box-shadow: 0 0 8px #248b3b44; }

        .logo-box {
            width: 55px;
            height: 55px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 6px;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        .channel-name { font-size: 11px; font-weight: bold; color: #efefef; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Tablet/Desktop adjustment */
        @media (min-width: 768px) {
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .logo-box { width: 70px; height: 70px; }
            .channel-name { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>BD FAST TV <span style="font-size: 10px; color: #eee;">V11.0</span></h1>
    </div>

    <!-- Video Player Area -->
    <div class="player-container">
        <video id="main-player" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">To view this video please enable JavaScript.</p>
        </video>
    </div>

    <div class="container">
        <div class="section-title">পছন্দের চ্যানেলসমূহ</div>
        <div class="channel-grid" id="channel-list">
            <!-- Channels will appear here -->
        </div>
    </div>

    <!-- Video.js and HLS support -->
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // আপনার দেওয়া নতুন সচল লিঙ্কসমূহ
        const channels = [
            { name: "9XM (1080)", logo: "https://upload.wikimedia.org/wikipedia/commons/e/ef/9XM_logo.png", url: "https://9xjio.wiseplayout.com/9XM/master.m3u8" },
            { name: "B4 MUSIC", logo: "https://via.placeholder.com/60?text=B4", url: "https://cdn-2.pishow.tv/live/415/master.m3u8" },
            { name: "ETV MUSIC", logo: "https://via.placeholder.com/60?text=ETV", url: "https://cc-szivnms4rlah6.akamaized.net/WWBI/Amagi/ETV_Music_IN/playlist.m3u8" },
            { name: "MUSIC HINDI", logo: "https://via.placeholder.com/60?text=Hindi", url: "https://cdn-2.pishow.tv/live/226/master.m3u8" },
            { name: "SANGEET BANGLA", logo: "https://via.placeholder.com/60?text=Sangeet", url: "https://cdn-4.pishow.tv/live/1143/master.m3u8" },
            { name: "AAKASH AATH", logo: "https://via.placeholder.com/60?text=Aakash", url: "https://mumt03.tangotv.in/Dsly5z3HAAKASHAATH/index.m3u8" },
            { name: "Shemaroo TV", logo: "https://via.placeholder.com/60?text=Shemaroo", url: "https://airtelapp.shemaroo.com/shemarootv/smil:shemarootvadp.smil/playlist.m3u8" },
            { name: "ENTER 10 BANGLA", logo: "https://via.placeholder.com/60?text=E10", url: "https://live-bangla.akamaized.net/liveabr/playlist.m3u8" },
            { name: "BIG MAGIC", logo: "https://via.placeholder.com/60?text=Magic", url: "https://mumt05.tangotv.in/87NeALx2BIGMAGIC/index.m3u8" },
            { name: "ATN BANGLA", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/4/40/ATN_Bangla_logo.svg/1200px-ATN_Bangla_logo.svg.png", url: "https://app.ncare.live/c3VydmVyX8RpbEU9Mi8xNy8yMDE0GIDU6RgzQ6NTAgdEoaeFzbF92YWxIZTO0U0ezN1IzMyfvcGVMZEJCTEFWeVN3PTOmdFsaWRtaW51aiPhnPTI2/atnbanglauk-off.stream/playlist.m3u8" },
            { name: "SRK TV", logo: "https://via.placeholder.com/60?text=SRK", url: "https://srknowapp.ncare.live/srktvhlswodrm/srktv.stream/tracks-v1a1/mono.m3u8" },
            { name: "DESH TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f0/Desh_TV_logo.svg/1200px-Desh_TV_logo.svg.png", url: "https://bozztv.com/rongo/rongo-DeshTV/index.m3u8" },
            { name: "PEACE TV BANGLA", logo: "https://via.placeholder.com/60?text=Peace", url: "https://dzkyvlfyge.erbvr.com/PeaceTvBangla/tracks-v3a1/mono.m3u8?sid=s7AaNdTzDE2912wNcPLejQ" }
        ];

        const channelList = document.getElementById('channel-list');
        const player = videojs('main-player');

        function loadChannels() {
            channels.forEach((ch, index) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="logo-box">
                        <img src="${ch.logo}" alt="" onerror="this.src='https://via.placeholder.com/60?text=TV'">
                    </div>
                    <div class="channel-name">${ch.name}</div>
                `;
                
                card.onclick = () => {
                    // Active style toggle
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    
                    // Load and play video
                    player.src({ src: ch.url, type: 'application/x-mpegURL' });
                    player.play();
                    
                    // Smooth scroll to player
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                channelList.appendChild(card);
            });

            // শুরুতে প্রথম চ্যানেলটি লোড করে রাখা
            if(channels.length > 0) {
                player.src({ src: channels[0].url, type: 'application/x-mpegURL' });
            }
        }

        window.onload = loadChannels;
    </script>
</body>
</html>
